# Storage encryption mismatch (database-at-rest)
# LOCALIZATION NOTE (profileEncryptedButPrefOff, profileNotEncryptedButPrefOn): %S is the application name.
profileEncryptedButPrefOff=お使いの %S プロファイルは暗号化されたデータベースを保持していますが、この %S のビルドはデータベースを暗号化せずに開くよう設定されています。プロファイルの破損を避けるため、%S は起動しません。設定またはポリシーでデータベースの暗号化を有効にしてから、もう一度お試しください。
profileEncryptedButPrefOffTitle=暗号化されたプロファイル
profileNotEncryptedButPrefOn=お使いの %S プロファイルは暗号化されていないデータベースを含んでいますが、この %S のビルドは暗号化を必須とするよう設定されています。%S は既存のデータを自動的に移行できません。続行するには、暗号化の必須要件を無効にするか、新しいプロファイルを使用してください。
profileNotEncryptedButPrefOnTitle=プロファイルの移行が必要です

