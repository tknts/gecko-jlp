CORSDidNotSucceed2=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS リクエストが成功しなかった)。ステータスコード: %2$S。
CORSOriginHeaderNotAdded=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS ヘッダー 'Origin' を追加できません)。
CORSExternalRedirectNotAllowed=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS リクエストの外部リダイレクトは許可されていません)。
CORSRequestNotHttp=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS リクエストが HTTP ではない)。
CORSMissingAllowOrigin2=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS ヘッダー 'Access-Control-Allow-Origin' が不足している)。ステータスコード: %2$S。
CORSMultipleAllowOriginNotAllowed=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: 複数の CORS ヘッダー 'Access-Control-Allow-Origin' は許可されていない)。
CORSAllowOriginNotMatchingOrigin=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS ヘッダー 'Access-Control-Allow-Origin' が '%2$S' と一致しない)。
CORSNotSupportingCredentials=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、'%1$S' にあるリモートリソースの読み込みは拒否されます。(理由: CORS ヘッダー 'Access-Control-Allow-Origin' が '*' の場合、認証情報はサポートされない)。
CORSMethodNotFound=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS ヘッダー 'Access-Control-Allow-Methods' にメソッドが見つからない)。
CORSMissingAllowCredentials=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS ヘッダー 'Access-Control-Allow-Credentials' は 'true' である必要があります)。
CORSPreflightDidNotSucceed3=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS プリフライトレスポンスが成功しなかった)。ステータスコード: %2$S。
CORSInvalidAllowMethod=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS ヘッダー 'Access-Control-Allow-Methods' 内に無効なトークン '%2$S' がある)。
CORSInvalidAllowHeader=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS ヘッダー 'Access-Control-Allow-Headers' 内に無効なトークン '%2$S' がある)。
CORSMissingAllowHeaderFromPreflight2=オリジン間のリクエストがブロックされました: 同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みは拒否されます。(理由: CORS プリフライトレスポンスの 'Access-Control-Allow-Headers' ヘッダーで許可されていないヘッダー '%2$S' があります)。
CORSAllowHeaderFromPreflightDeprecation=オリジン間のリクエストの警告: まもなく同一生成元ポリシーにより、%1$S にあるリモートリソースの読み込みが拒否されるようになります。(理由: 'Access-Control-Allow-Headers' が '*' の場合、'Authorization' ヘッダーはカバーされません。'Authorization' ヘッダーを含めるには、CORS ヘッダー 'Access-Control-Allow-Headers' に明示的にリストする必要があります)。

